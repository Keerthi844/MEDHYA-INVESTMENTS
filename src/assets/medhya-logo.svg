<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#1a4d2e" rx="20"/>
  
  <!-- Outer circle border -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="#d4af37" stroke-width="3"/>
  
  <!-- Inner circle border -->
  <circle cx="150" cy="150" r="135" fill="none" stroke="#d4af37" stroke-width="1"/>
  
  <!-- Arrow (growth indicator) -->
  <path d="M 220 210 L 240 190 L 230 200" fill="#d4af37" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="220" y1="210" x2="240" y2="190" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Tree trunk -->
  <rect x="135" y="160" width="30" height="60" fill="#d4af37" rx="3"/>
  
  <!-- Tree canopy - leaves -->
  <circle cx="150" cy="90" r="35" fill="#d4af37" opacity="0.9"/>
  <circle cx="120" cy="110" r="28" fill="#d4af37" opacity="0.8"/>
  <circle cx="180" cy="110" r="28" fill="#d4af37" opacity="0.8"/>
  <circle cx="105" cy="150" r="22" fill="#d4af37" opacity="0.7"/>
  <circle cx="195" cy="150" r="22" fill="#d4af37" opacity="0.7"/>
  
  <!-- Elephant head -->
  <circle cx="80" cy="180" r="25" fill="#d4af37"/>
  
  <!-- Elephant ear -->
  <ellipse cx="55" cy="165" rx="18" ry="35" fill="#d4af37" opacity="0.85"/>
  
  <!-- Elephant trunk -->
  <path d="M 95 195 Q 105 210 100 230" stroke="#d4af37" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Elephant tusks -->
  <path d="M 70 200 Q 65 215 68 230" stroke="#d4af37" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 90 200 Q 95 215 92 230" stroke="#d4af37" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>